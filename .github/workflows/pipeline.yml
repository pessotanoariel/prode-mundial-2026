name: World Cup Forecast Atlas Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-pipeline:
    name: Run pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          set -o pipefail
          mkdir -p execution_logs
          python main.py 2>&1 | tee execution_logs/pipeline.log

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: world-cup-forecast-atlas-pipeline
          if-no-files-found: error
          path: |
            data/output/*
            data/processed/*
            execution_logs/*
